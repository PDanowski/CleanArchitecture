name: CI Build, Test, Docker

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: Notebook/Notebook/global.json

      - name: Restore
        run: dotnet restore Notebook/Notebook/Notebook.sln

      - name: Build
        run: dotnet build Notebook/Notebook/Notebook.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Notebook/Notebook/Notebook.sln --configuration Release --no-build --verbosity normal

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        run: docker build -f Notebook/Notebook/Dockerfile -t notebook-web:ci Notebook/Notebook
